    setinfo_success: "<emoji document_id=5436040291507247633>🎉</emoji> <b>Текст інфо успішно змінено</b>"
    desc: "<emoji document_id=5188377234380954537>🌘</emoji> <b>Що таке Userbot?</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> Userbot - це <b>стороння програма</b>, яка взаємодіє з Telegram API для виконання <b>автоматизованих завдань від імені користувача</b>. Юзерботи можуть використовуватися для автоматизації різних завдань, таких як <b>відправка повідомлень, приєднання до каналів, завантаження медіафайлів і багато іншого</b>.\n\n<emoji document_id=5474667187258006816>😎</emoji> Юзерботи відрізняються від звичайних ботів у Telegram тим, що <b>вони працюють на акаунті користувача</b>, а не на бот-акаунті. Це означає, що вони можуть мати доступ до більшої кількості функцій і володіють більшою гнучкістю в плані виконання дій.\n\n<emoji document_id=5472267631979405211>🚫</emoji> Однак важливо зазначити, що <b>юзерботи офіційно не підтримуються Telegram</b> і їх використання може порушувати умови використання платформи. Тому <b>користувачі повинні бути обережними при їх використанні</b> і переконатися, що на їхньому акаунті не виконується шкідливий код.\n\n"
    _cmd_doc_hikkainfo: "Відправити інформацію на кшталт 'Що таке Хікка?'"
    _cmd_doc_info: "Відправляє інформацію про бота"
    _cmd_doc_setinfo: "<текст> - Змінити текст у .info"

