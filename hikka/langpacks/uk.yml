quickstart:
    base: "🌘🇺🇦 <b>Привіт.</b> Твій юзербот <b>Hikka</b> встановлено.\n\n❓ <b>Потрібна допомога?</b> Вступай у наш чат підтримки. Ми допомагаємо <b>всім</b>.\n\n📼 <b>Ти можеш шукати і встановлювати модулі через @hikkamods_bot. Просто введи пошуковий запит і натисни ⛩ Install на потрібному модулі</b>\n\n📣 <b>Зазирни в канали з модулями, створеними ком'юніті: <a href=\"https://t.me/hikka_ub/126\">показати</a></b>\n\n💁‍♀️ <b>Швидкий гайд:</b>\n\n1️⃣ <b>Напиши</b> <code>.help</code> <b>щоб побачити список модулів</b>\n2️⃣ <b>Напиши</b> <code>.help &lt;Назва модуля/команда&gt;</code> <b>щоб побачити опис модуля</b>\n3️⃣ <b>Напиши</b> <code>.dlmod &lt;посилання&gt;</code> <b>щоб завантажити модуль за посиланням</b>\n4️⃣ <b>Напиши</b> <code>.loadmod</code> <b>відповіддю на файл, щоб завантажити модуль з нього</b>\n5️⃣ <b>Напиши</b> <code>.unloadmod &lt;Назва модуля&gt;</code> <b>щоб вивантажити модуль</b>\n\n💡 <b>Hikka підтримує модулі з Friendly-Telegram, DragonUserbot і GeekTG, а також свої власні.</b>\n"
    railway: "🚂 <b>Твій юзербот встановлено на Railway</b>. На цій платформі ти отримуєш лише <b>500 безкоштовних годин на місяць</b>. Коли ліміт буде досягнуто, твій <b>юзербот буде заморожений</b>. Наступного місяця <b>ти повинен будеш перейти на https://railway.app і перезапустити його</b>."
    lavhost: "✌️ <b>Твій юзербот встановлено на lavHost</b>. Вступи до @lavhost, щоб отримувати важливі повідомлення та оновлення. Всі запитання, пов'язані з платформою, слід ставити в @lavhostchat."
